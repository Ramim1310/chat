version: "2"
type: frontend
tech_stack:
  - React 19
  - Vite 7
  - TailwindCSS 4
  - Framer Motion
  - Socket.IO Client
  - Axios
  - React Hot Toast
  - Node.js / Express (backend)
  - Prisma ORM (backend)
  - Socket.IO (backend)
  - JWT Authentication (backend)
routes:
  - path: /
    file: src/App.jsx
    auth_required: false
    description: Root entry - shows Login, Signup, Welcome, or Dashboard based on auth state
  - path: /#login
    file: src/components/Login.jsx
    auth_required: false
    description: Login view rendered conditionally in App
  - path: /#signup
    file: src/components/Signup.jsx
    auth_required: false
    description: Signup/Registration view rendered conditionally in App
  - path: /#welcome
    file: src/components/WelcomeScreen.jsx
    auth_required: true
    description: Animated welcome screen shown after login before entering the dashboard
  - path: /#dashboard
    file: src/Dashboard.jsx
    auth_required: true
    description: Main application dashboard with sidebar tabs for chats, community, news, search, and settings
features:
  - name: User Login
    description: Users log in with email and password; JWT access token stored in localStorage; refresh token set as HttpOnly cookie
    files:
      - src/components/Login.jsx
      - src/api.js
      - src/App.jsx
    entry_route: /
    user_interactions:
      - Enter email address in email input
      - Enter password in password input
      - Click Login button to submit form
      - See error toast on invalid credentials
      - Redirected to welcome screen on success
    api_calls:
      - method: POST
        endpoint: /login
    auth_required: false

  - name: User Registration (Signup)
    description: New users register with name, email, password, and optional avatar image URL
    files:
      - src/components/Signup.jsx
      - src/api.js
      - src/App.jsx
    entry_route: /
    user_interactions:
      - Enter full name
      - Enter email address
      - Enter password
      - Optionally enter profile image URL
      - Click Sign Up button
      - See error toast if email already taken
      - Redirected to welcome screen on success
    api_calls:
      - method: POST
        endpoint: /register
    auth_required: false

  - name: Welcome Screen
    description: Animated greeting shown to users after login/signup before entering the main dashboard
    files:
      - src/components/WelcomeScreen.jsx
      - src/App.jsx
    entry_route: /
    user_interactions:
      - View animated welcome message with user name
      - Click "Start Chatting" to navigate to the Chats tab
      - Click "Community Feed" to navigate to the Community tab
    api_calls: []
    auth_required: true

  - name: Real-Time Direct Messaging (Chat)
    description: Users can send and receive real-time messages with friends via Socket.IO; messages are stored in the DB; supports typing indicators, seen/sent status
    files:
      - src/Chat.jsx
      - src/Dashboard.jsx
      - src/socket.js
      - src/components/TypingIndicator.jsx
    entry_route: /
    user_interactions:
      - Select a friend from the friends list to open a chat room
      - Type a message in the message input box
      - Press Enter or click Send to send a message
      - See typing indicator when other user is typing
      - Messages show sent/seen status
      - Scroll through message history
    api_calls:
      - method: GET
        endpoint: /api/messages?room={roomId}
      - method: POST
        endpoint: /api/messages
    auth_required: true

  - name: Friends List & Active Users
    description: Shows a user's list of accepted friends and which ones are currently online
    files:
      - src/Dashboard.jsx
    entry_route: /
    user_interactions:
      - View list of friends in the sidebar
      - See online/offline status indicators
      - Click a friend to open a chat
    api_calls:
      - method: GET
        endpoint: /api/users/me
    auth_required: true

  - name: Search Users
    description: Search for other users by name to send friend requests
    files:
      - src/components/SearchUsers.jsx
      - src/Dashboard.jsx
    entry_route: /
    user_interactions:
      - Click the Search tab in the sidebar
      - Type a user's name in the search box
      - See matching users in the results list
      - Click "Add Friend" to send a friend request
    api_calls:
      - method: POST
        endpoint: /api/users/search
      - method: POST
        endpoint: /api/friend-request/send
    auth_required: true

  - name: Friend Requests
    description: View and manage incoming friend requests; accept or reject them; real-time notifications via Socket.IO
    files:
      - src/components/FriendRequests.jsx
      - src/Dashboard.jsx
    entry_route: /
    user_interactions:
      - View the friend requests notification badge
      - Open the friend requests panel
      - Accept a pending friend request
      - Reject a pending friend request
      - Receive real-time friend request notification toast
    api_calls:
      - method: GET
        endpoint: /api/friend-request/pending/{userId}
      - method: POST
        endpoint: /api/friend-request/accept
      - method: POST
        endpoint: /api/friend-request/reject
    auth_required: true

  - name: Community Feed (Posts & Comments)
    description: A Reddit-like community forum where users can create posts in named communities, comment on posts (threaded), like posts, and see AI-generated summaries
    files:
      - src/components/CommunityFeed.jsx
      - src/Dashboard.jsx
    entry_route: /
    user_interactions:
      - Click the Community tab in the sidebar
      - Click "Create Post" and fill in title, content, and community name
      - Submit the post
      - View posts in the feed with author, community, and AI insight
      - Click the like/reaction button on a post
      - Click "Comment" to expand comment section on a post
      - Write and submit a comment
    api_calls:
      - method: GET
        endpoint: /api/posts
      - method: POST
        endpoint: /api/posts
      - method: POST
        endpoint: /api/posts/{postId}/comments
      - method: POST
        endpoint: /api/posts/{postId}/like
    auth_required: true

  - name: Live News Thread
    description: A live feed of news articles fetched periodically from RSS feeds, categorized by topic
    files:
      - src/components/LiveThread.jsx
      - src/Dashboard.jsx
    entry_route: /
    user_interactions:
      - Click the Live News tab in the sidebar
      - Browse news articles in a scrollable live feed
      - Click "Load More" to fetch older articles
      - Click an article to open the source URL
    api_calls:
      - method: GET
        endpoint: /api/news/live
      - method: GET
        endpoint: /api/news/{category}
    auth_required: false

  - name: User Settings & Profile
    description: Users can update their display name and profile picture URL, toggle dark/light theme, and log out
    files:
      - src/components/Settings.jsx
      - src/ThemeContext.jsx
      - src/App.jsx
    entry_route: /
    user_interactions:
      - Click the Settings tab in the sidebar
      - Edit display name and submit
      - Paste a new profile image URL and save
      - Toggle between light and dark mode
      - Click Logout to clear session and return to login
    api_calls:
      - method: GET
        endpoint: /api/users/me
      - method: PATCH
        endpoint: /api/users/me
    auth_required: true

  - name: Sidebar Navigation
    description: Persistent left sidebar with tab icons for switching between Chats, Community, Live News, Search, Friend Requests, and Settings
    files:
      - src/components/Sidebar.jsx
      - src/Dashboard.jsx
    entry_route: /
    user_interactions:
      - Click sidebar icons to switch between tabs
      - See notification badges on friend requests icon
      - View app logo and current user avatar
    api_calls: []
    auth_required: true

known_limitations:
  - issue: Post likes are stored in-memory on the server (Map), not persisted in the database
    location: server/index.js (postLikes Map)
    impact: Likes reset on server restart and are not truly persistent
  - issue: Token refresh uses HttpOnly cookies which may not work cross-origin without SameSite=None + Secure settings
    location: server/index.js, src/api.js
    impact: Auth may silently fail in some browser/OS environments
  - issue: No dedicated route-based navigation (SPA uses conditional rendering with view state, not React Router)
    location: src/App.jsx
    impact: Deep linking and browser back/forward navigation not supported
